<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Recibo de pago</title>

<style>
  body {
    font-family: Arial, sans-serif;
    width: 5.5in;
    height: 8.5in;
    padding: 20px;
    font-size: 12px;
    border: 1px solid #000;
  }

  h2 {
    text-align: center;
    margin-bottom: 10px;
  }

  .section-title {
    font-weight: bold;
    margin-top: 12px;
    border-bottom: 1px solid #000;
  }

  .label {
    font-weight: bold;
  }

  .qr {
    margin-top: 20px;
    text-align: center;
  }

  .firma {
    margin-top: 40px;
    text-align: center;
  }

  .firma-linea {
    margin-top: 40px;
    border-top: 1px solid #000;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>

<body>

<h2>RECIBO DE PAGO</h2>

<div class="section-title">Datos del envío</div>
<p><span class="label">Guía:</span> {{guia}}</p>
<p><span class="label">Fecha:</span> {{fecha}}</p>

<div class="section-title">Pago</div>
<p><span class="label">Monto pagado:</span> ${{monto}}</p>
<p><span class="label">Método:</span> {{metodo}}</p>

<div class="section-title">Cliente</div>
<p>{{remitenteNombre}}</p>
<p>{{remitenteCalle}} #{{remitenteNumero}}, {{remitenteColonia}}</p>
<p>{{remitenteCiudad}}, {{remitenteEstado}}, CP {{remitenteCP}}</p>

<div class="qr">
  <img src="{{qrPago}}" width="120" />
</div>

<div class="firma">
  Firma del cliente
  <div class="firma-linea"></div>
</div>

</body>
</html>
